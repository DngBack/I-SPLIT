# Shared defaults across pilot/full scale. Scale-specific overrides live in
# pilot.yaml / full.yaml -- they should only touch data-scale-related fields.
seed: 0
results_dir: results

encoders:
  pooling: mean
  batch_size: 4
  device: cpu

subspace:
  energy_threshold: 0.95
  tau_values: [0.0001, 0.01, 0.1, 1.0]
  factors: [content, speaker, environment, channel]
