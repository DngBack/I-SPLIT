# CPU pilot scale: small enough to run end-to-end on a machine with no GPU in
# a reasonable time. This is what this repo validates by default -- results
# from this config are preliminary/pilot, not paper-final numbers.
data:
  max_speakers: 20
  max_utterances_per_speaker: 15
  max_musan_noise_files: 40
  max_librispeech_speakers: 15
  max_librispeech_utterances_per_speaker: 10
  held_out_speaker_fraction: 0.2
  n_speaker_pairs: 400
  n_content_pairs: 400
  n_environment_pairs: 400
  n_channel_pairs: 400
  snr_levels_db: [0.0, 10.0, 20.0]
  seed: 0
